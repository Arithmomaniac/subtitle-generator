name: Deploy Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/**']
  workflow_dispatch:
    inputs:
      environmentName:
        description: 'Environment name (resource prefix)'
        required: true
        default: 'subtitlegen'
      location:
        description: 'Azure region'
        required: true
        default: 'eastus'

permissions:
  id-token: write
  contents: read

jobs:
  deploy-infra:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: subscription
          region: ${{ inputs.location || 'eastus' }}
          template: infra/main.bicep
          parameters: >
            environmentName=${{ inputs.environmentName || 'subtitlegen' }}
            location=${{ inputs.location || 'eastus' }}
          deploymentName: ${{ inputs.environmentName || 'subtitlegen' }}-${{ github.run_number }}

      - name: Enable static website
        shell: bash
        run: |
          ENVIRONMENT_NAME="${{ inputs.environmentName || 'subtitlegen' }}"
          STORAGE_ACCOUNT_NAME=$(az deployment sub show \
            --name "${ENVIRONMENT_NAME}-${{ github.run_number }}" \
            --query "properties.outputs.storageAccountName.value" \
            --output tsv)

          az storage blob service-properties update \
            --account-name "$STORAGE_ACCOUNT_NAME" \
            --static-website \
            --index-document index.html \
            --404-document 404.html \
            --auth-mode login
