<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="api-base" content="">
<title>Subtitle Generator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
[x-cloak]{display:none!important}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.app{max-width:860px;margin:0 auto;padding:20px}

/* Header */
.header{text-align:center;padding:16px 0;border-bottom:1px solid #333;margin-bottom:20px}
.header h1{font-size:20px;color:#f0f0f0;font-weight:600}
.header .tagline{font-size:12px;color:#666;margin-top:4px}
.mode-badge{display:inline-block;margin-top:6px;padding:2px 10px;border-radius:12px;font-size:10px;font-weight:700;text-transform:uppercase}
.mode-local{background:#2d6a4f;color:#b7e4c7}
.mode-azure{background:#3a506b;color:#bde0fe}

/* Settings */
.settings{background:#16213e;border:1px solid #2a2a4a;border-radius:10px;padding:14px 18px;margin-bottom:18px}
.settings-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;cursor:pointer}
.settings-header h2{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:1px}
.settings-toggle{font-size:11px;color:#6c8ebf;border:none;background:none;cursor:pointer}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px}
.setting label{display:block;font-size:10px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.setting select,.setting input[type=number]{width:100%;padding:5px 8px;background:#0f1a30;border:1px solid #333;border-radius:5px;color:#e0e0e0;font-size:12px}
.setting .switch-row{display:flex;align-items:center;gap:6px}
.switch{width:32px;height:18px;border-radius:9px;background:#444;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.switch.on{background:#2d6a4f}
.switch .knob{width:14px;height:14px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:left .2s}
.switch.on .knob{left:16px}
.switch-label{font-size:12px;color:#aaa}

/* Subtitle display */
.subtitle-display{background:#0f1a30;border:2px solid #2a2a4a;border-radius:12px;padding:20px;margin-bottom:16px;text-align:center;min-height:90px;display:flex;flex-direction:column;justify-content:center}
.pattern-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.slot-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;font-size:18px;line-height:1.8}
.slot{display:inline-flex;align-items:center;padding:3px 10px;border-radius:7px}
.slot-list1{background:#1a3a2a;border:1px solid #2d6a4f;color:#a8dadc}
.slot-list2{background:#1a2a3a;border:1px solid #3a6b8c;color:#a8c8dc}
.slot-action{background:#2a1a3a;border:1px solid #6b3a8c;color:#d4a8dc}
.slot-of{background:#3a2a1a;border:1px solid #8c6b3a;color:#dcd4a8}
.slot-subpart{background:#332a1a;border:1px dashed #8c6b3a;color:#dcd4a8;font-size:16px}
.punc{color:#555;font-size:18px;user-select:none}
.empty-state{color:#555;font-style:italic;font-size:16px}

/* Actions */
.actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:18px}
.btn{padding:8px 20px;border-radius:7px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s}
.btn:hover{transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:#e07a5f;color:#fff}
.btn-secondary{background:#2a2a4a;color:#ccc;border:1px solid #444}
.btn-jacket{background:#3d405b;color:#f4f1de;border:1px solid #555}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* Sources */
.sources{background:#0f1a30;border:1px solid #2a2a4a;border-radius:8px;padding:10px 14px;margin-bottom:18px}
.sources h4{font-size:10px;color:#666;text-transform:uppercase;margin-bottom:6px}
.source-line{font-size:11px;color:#777;margin-bottom:3px;line-height:1.4}
.source-line .filler{color:#aaa;font-weight:600}
.source-line .book{color:#6c8ebf}
.source-line .tag{color:#555}
.source-line .remix-info{color:#dcd4a8;font-style:italic}

/* Jacket */
.jacket-section{background:#16213e;border:1px solid #2a2a4a;border-radius:10px;padding:16px 20px;margin-bottom:18px}
.jacket-actions{display:flex;gap:6px;margin-bottom:12px}
.btn-sm{padding:4px 12px;font-size:11px}
.jacket-body{font-size:13px;color:#ccc;line-height:1.7}
.jacket-body h2{font-size:16px;color:#f4f1de;margin:16px 0 6px;padding-top:10px;border-top:1px solid #2a2a4a}
.jacket-body h2:first-child{margin-top:0;padding-top:0;border-top:none}
.jacket-body p{margin-bottom:10px}
.jacket-body blockquote{border-left:3px solid #e07a5f;padding-left:12px;margin:8px 0;color:#bbb;font-style:italic}
.jacket-body strong{color:#f0f0f0}

/* Prompt */
.prompt-section{background:#1a2a1a;border:1px solid #2d6a4f;border-radius:10px;padding:14px 18px;margin-bottom:18px}
.prompt-section h3{font-size:13px;color:#81b29a;margin-bottom:6px}
.prompt-text{background:#0f1a30;border:1px solid #333;border-radius:6px;padding:10px;font-family:'Cascadia Code',monospace;font-size:11px;color:#ccc;line-height:1.5;white-space:pre-wrap;max-height:250px;overflow-y:auto}
.prompt-actions{display:flex;gap:8px;margin-top:8px;align-items:center}
.model-links{font-size:11px;color:#6c8ebf}
.model-links a{color:#6c8ebf;text-decoration:none;margin:0 4px}
.model-links a:hover{text-decoration:underline}

/* Footer */
.footer{text-align:center;padding:14px 0;font-size:10px;color:#444;border-top:1px solid #222}
.footer a{color:#6c8ebf;text-decoration:none}
.footer a:hover{text-decoration:underline}

/* Rating */
.rating-section{background:#16213e;border:1px solid #2a2a4a;border-radius:10px;padding:10px 14px;margin-bottom:16px}
.rating-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.rating-label{font-size:12px;color:#aaa;min-width:160px}
.btn-thumb{width:40px;height:34px;border-radius:7px;border:1px solid #444;background:#2a2a4a;font-size:18px;cursor:pointer;transition:all .12s}
.btn-thumb:hover:not(:disabled){transform:translateY(-1px)}
.btn-thumb:disabled{opacity:.5;cursor:not-allowed}
.btn-thumb-up:hover:not(:disabled),.btn-thumb-up.active{background:#2d6a4f;border-color:#3fb950}
.btn-thumb-down:hover:not(:disabled),.btn-thumb-down.active{background:#4a2028;border-color:#f85149}
.btn-tone{padding:4px 14px;border-radius:14px;border:1px solid #3a6b8c;background:#1a2a3a;color:#a8c8dc;font-size:11px;cursor:pointer;transition:all .12s}
.btn-tone:hover{border-color:#58a6ff}
.btn-tone.active{background:#e07a5f;border-color:#e07a5f;color:#fff}
.btn-tag{padding:4px 10px;border-radius:14px;border:1px solid #3a5b4c;background:#1a2a2a;color:#a8dcb8;font-size:11px;cursor:pointer;transition:all .12s}
.btn-tag:hover{border-color:#58ff8a}
.btn-tag.active{background:#5f9fe0;border-color:#5f9fe0;color:#fff}
.tag-row{gap:6px}
.rating-reveal{font-size:11px;color:#81b29a;padding:4px 0}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #444;border-top-color:#e07a5f;border-radius:50%;animation:spin .6s linear infinite;margin-right:6px;vertical-align:middle}
</style>
<script src="https://js.monitor.azure.com/scripts/b/ai.3.gbl.min.js"></script>
<script>
(function() {
  try {
    fetch("./ai-config.json")
      .then(function(r) { return r.ok ? r.json() : null; })
      .then(function(cfg) {
        if (!cfg || !cfg.connectionString) return;
        var ai = new Microsoft.ApplicationInsights.ApplicationInsights({
          config: { connectionString: cfg.connectionString }
        });
        ai.loadAppInsights();
        ai.trackPageView();
        window.appInsights = ai;
      })
      .catch(function() {});
  } catch(e) {}
})();
</script>
<script type="module">
  import { createApp } from "./js/app.js";
  document.addEventListener("alpine:init", () => {
    Alpine.data("subtitleApp", createApp);
  });
</script>
<script defer src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"></script>
</head>
<body>
<div class="app" x-cloak x-data="subtitleApp" x-init="init()">

  <!-- Header -->
  <div class="header">
    <h1>Subtitle Generator</h1>
    <div class="tagline">X, Y, and the Z of W</div>
    <span class="mode-badge" :class="modeBadgeClass" x-text="modeBadgeText"></span>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="settings-header" @click="settingsOpen = !settingsOpen">
      <h2>Settings</h2>
      <button class="settings-toggle" x-text="settingsOpen ? 'collapse' : 'expand'"></button>
    </div>
    <div class="settings-grid" x-show="settingsOpen" @change="saveSettings()">
      <div class="setting">
        <label>Tone</label>
        <select x-model="tone">
          <option value="">Any</option>
          <option value="pop">Pop</option>
          <option value="mainstream">Mainstream</option>
          <option value="niche">Niche</option>
          <option value="pop,mainstream">Pop + Mainstream</option>
        </select>
      </div>
      <div class="setting" x-show="settingsVis.showModel && availableModels.length > 0">
        <label>Model</label>
        <select x-model="model">
          <template x-for="m in availableModels" :key="m.id">
            <option :value="m.id" x-text="m.name + (m.cost !== 1.0 ? ' (' + m.cost + 'x)' : '')"></option>
          </template>
        </select>
      </div>
    </div>
  </div>

  <!-- Subtitle Display -->
  <div class="subtitle-display">
    <div class="pattern-label">Generated Subtitle</div>
    <div class="slot-row">
      <template x-if="!hasSubtitle">
        <span class="empty-state">Click Generate to start</span>
      </template>
      <template x-for="(slot, i) in subtitle.slots" :key="i">
        <span :class="slot.isPunc ? 'punc' : 'slot ' + slot.cls" x-text="slot.text"></span>
      </template>
    </div>
  </div>

  <!-- Rating -->
  <div class="rating-section" x-show="hasSubtitle" x-cloak>
    <div class="rating-row">
      <span class="rating-label">Good subtitle?</span>
      <button class="btn-thumb btn-thumb-up" :class="{ active: ratingSubmitted && ratingSubmitted === 1 }" @click="submitRating(1)" :disabled="ratingSubmitted">👍</button>
      <button class="btn-thumb btn-thumb-down" :class="{ active: ratingSubmitted && ratingSubmitted === -1 }" @click="submitRating(-1)" :disabled="ratingSubmitted">👎</button>
    </div>
    <div class="rating-row" x-show="!ratingSubmitted">
      <span class="rating-label">Where does this belong?</span>
      <button class="btn-tone" :class="{ active: selectedTone === 'pop' }" @click="selectTone('pop')">Pop</button>
      <button class="btn-tone" :class="{ active: selectedTone === 'mainstream' }" @click="selectTone('mainstream')">Mainstream</button>
      <button class="btn-tone" :class="{ active: selectedTone === 'niche' }" @click="selectTone('niche')">Niche</button>
    </div>
    <!-- Collapsible quality tags pane -->
    <div class="rating-row" x-show="!ratingSubmitted">
      <button class="btn-toggle-tags" @click="tagsExpanded = !tagsExpanded; if(tagsExpanded) sessionStorage.setItem('tagsExpanded','1')" x-text="tagsExpanded ? '▾ Tags' : '▸ Tags'" style="font-size:11px;color:#81b29a;background:none;border:none;cursor:pointer;padding:0"></button>
    </div>
    <div class="rating-row tag-row" x-show="!ratingSubmitted && tagsExpanded" x-cloak>
      <button class="btn-tag" :class="{ active: selectedTags.includes('funny') }" @click="toggleTag('funny')">😄 Funny</button>
      <button class="btn-tag" :class="{ active: selectedTags.includes('grammar') }" @click="toggleTag('grammar')">🤔 Grammar</button>
      <button class="btn-tag" :class="{ active: selectedTags.includes('contradiction') }" @click="toggleTag('contradiction')">🔄 Contradictory</button>
      <button class="btn-tag" :class="{ active: selectedTags.includes('boring') }" @click="toggleTag('boring')">😴 Boring</button>
    </div>
    <div class="rating-reveal" x-show="ratingToneRevealed" x-cloak>
      ✓ Rating saved<template x-if="selectedTone"> — you said: <strong x-text="selectedTone"></strong></template>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" @click="generate()" :disabled="loading">
      <span x-show="loading" class="spinner"></span>
      <span x-text="loading ? 'Generating...' : 'Generate'"></span>
    </button>
    <button class="btn btn-secondary" x-ref="copyBtn" @click="copySubtitle()" :disabled="!hasSubtitle">Copy</button>
    <button class="btn btn-jacket" x-show="mode === 'local' && availableModels.length > 0" @click="generateJacket()" :disabled="!hasSubtitle || jacketLoading">
      <span x-show="jacketLoading" class="spinner"></span>
      <span x-text="jacketLoading ? (jacketProgress || 'Generating...') : 'Generate Jacket'"></span>
    </button>
    <button class="btn btn-jacket" @click="buildPrompt()" :disabled="!hasSubtitle || jacketLoading">
      <span x-show="jacketLoading" class="spinner"></span>
      <span x-text="jacketLoading ? (jacketProgress || 'Building...') : 'Build Prompt'"></span>
    </button>
  </div>

  <!-- Sources -->
  <div class="sources" x-show="sources.length > 0">
    <h4>Sources</h4>
    <template x-for="src in sources" :key="src.label">
      <div class="source-line">
        <span class="filler" x-text="src.filler"></span>
        &larr;
        <template x-if="src.book">
          <span>
            <span class="book" x-text="src.book"></span>
            <span class="tag" x-text="'[' + src.tag + ']'"></span>
          </span>
        </template>
        <template x-if="!src.book">
          <span class="tag">(source not found)</span>
        </template>
      </div>
    </template>
    <div class="source-line remix-info" x-show="subtitle.remixed && subtitle.similarity != null"
         x-text="'Remix similarity: ' + (subtitle.similarity?.toFixed(3) ?? '')"></div>
  </div>

  <!-- Jacket Output -->
  <div class="jacket-section" x-show="jacket">
    <div class="jacket-actions">
      <button class="btn btn-secondary btn-sm" x-ref="copyMdBtn" @click="copyJacketMd()">Copy Markdown</button>
      <button class="btn btn-secondary btn-sm" x-ref="copyHtmlBtn" @click="copyJacketHtml()">Copy HTML</button>
    </div>
    <div class="jacket-body" x-html="jacketHtml"></div>
  </div>

  <!-- Prompt Copy -->
  <div class="prompt-section" x-show="prompt">
    <h3>Jacket Prompt <span x-show="toneTier" class="tag" x-text="'(' + toneTier + ')'"></span></h3>
    <div class="prompt-text" x-text="prompt"></div>
    <div class="prompt-actions">
      <button class="btn btn-primary" style="padding:5px 14px;font-size:11px" x-ref="copyPromptBtn" @click="copyPrompt()">Copy Prompt</button>
      <span class="model-links">
        Paste into:
        <a href="https://chatgpt.com" target="_blank">ChatGPT</a>
        <a href="https://claude.ai" target="_blank">Claude</a>
        <a href="https://gemini.google.com" target="_blank">Gemini</a>
      </span>
    </div>
  </div>

  <div class="footer"><a href="https://github.com/Arithmomaniac/subtitle-generator" target="_blank">subtitle-generator</a> &mdash; data from Library of Congress &amp; Open Library</div>

</div>
</body>
</html>
